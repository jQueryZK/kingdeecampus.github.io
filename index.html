        /* 样式优化，移动端适配 */
        * {

            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('http://xyz.51job.com/Static/jdrvd/loginlogo.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 1rem;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            z-index: 0;
            pointer-events: none;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        .brand {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .brand h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFE8C5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .brand h1 i {
            color: #ffd966;
            font-size: 1.6rem;
        }
        .brand p {
            color: #f0f3f8;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            font-size: 0.85rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(12px);
            border-radius: 1.75rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.4);
        }
        .form-wrapper {
            padding: 1.5rem 1.25rem;
        }
        .form-grid {
            display: grid;
            gap: 1.2rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: relative;
        }
        .input-group label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e3a5f;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .required-star {
            color: #e74c3c;
            margin-left: 4px;
        }
        .autocomplete-wrapper {
            position: relative;
            width: 100%;
        }
        .autocomplete-input {
            padding: 0.8rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
            background: #fff;
            width: 100%;
            outline: none;
        }
        .autocomplete-input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }
        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            max-height: 280px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            margin-top: 4px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .autocomplete-dropdown.show {
            display: block;
        }
        .dropdown-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }
        .dropdown-item:hover, .dropdown-item.active {
            background-color: #f0f9ff;
            color: #2c7da0;
        }
        .dropdown-item .highlight {
            font-weight: 700;
            color: #2c7da0;
        }
        .no-results, .result-count {
            padding: 0.75rem 1rem;
            color: #94a3b8;
            text-align: center;
            font-size: 0.85rem;
        }
        .result-count {
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            color: #64748b;
        }
        input, select, textarea {
            padding: 0.8rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
            background: #fff;
            width: 100%;
            outline: none;
        }
        .radio-group {
            display: flex;
            gap: 1.5rem;
            background: #fff;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            border: 1.5px solid #e2e8f0;
            flex-wrap: wrap;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .file-area {
            position: relative;
        }
        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #f8fbff, #eef6ff);
            border: 1.5px dashed #9fc3e6;
            border-radius: 1.25rem;
            padding: 0.95rem;
            cursor: pointer;
            color: #1f6392;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .file-label:hover {
            border-color: #2c7da0;
            background: linear-gradient(135deg, #f2f9ff, #e6f3ff);
            transform: translateY(-1px);
        }
        .file-label:active {
            transform: translateY(0);
        }
        #resumeFile {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            padding: 0;
            border: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            clip-path: inset(100%);
            white-space: nowrap;
        }
        .file-name {
            font-size: 0.78rem;
            color: #345a7d;
            margin-top: 9px;
            padding-left: 6px;
        }
        .file-hint {
            font-size: 0.7rem;
            color: #6c86a3;
            margin-top: 5px;
            padding-left: 6px;
        }
        .error-message {
            font-size: 0.7rem;
            color: #e74c3c;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            margin-top: 2rem;
        }
        .btn {
            padding: 0.9rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        .btn-primary {
            background: linear-gradient(105deg, #1f6392, #2c7da0);
            color: white;
            box-shadow: 0 6px 12px rgba(44,125,160,0.3);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-secondary {
            background: rgba(237,242,247,0.9);
            color: #2c3e50;
            border: 1px solid #cbd5e1;
        }
        .toast-notify {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            font-size: 0.85rem;
            white-space: nowrap;
            max-width: 85vw;
        }
        @media (max-width:768px){
            .container {
                max-width: 84vw;
            }
            .card {
                border-radius: 1.2rem;
            }
            .form-wrapper {
                padding: 1rem 0.85rem;
            }
        }
        @media (max-width:480px){
            body {
                padding: 0.65rem;
            }
            .container {
                max-width: 82vw;
            }
            .form-wrapper {
                padding: 0.85rem 0.72rem;
            }
            .toast-notify { white-space: normal; }

            opacity: 1;
            transform: translateX(-50%) scale(1);

            margin: 1.2rem 0;
            border: none;
            height: 1px;
            background: linear-gradient(to right, #cbd5e1, transparent);

        textarea {

            resize: vertical;
        }

            background: #e6f7e6;
            color: #2c7da0;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 20px;
            margin-left: 6px;

            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));

                grid-template-columns: 1fr;

<body>
<div class="container">
    <div class="brand">
        <h1><i class="fas fa-cloud-sun"></i> 金蝶2026 · 校园引力</h1>
        <p>全国高校+海量职位智能搜索 | 一键投递直达HR邮箱</p>
    </div>
    <div class="card">
        <div class="form-wrapper">
            <form id="applicationForm" novalidate>
                <div class="form-grid">
                    <!-- 姓名 -->
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> 姓名 <span class="required-star">*</span></label>
                        <input type="text" id="fullname">
                        <div class="error-message" id="error-fullname"></div>
                    </div>
                    <!-- 性别 -->
                    <div class="input-group">
                        <label><i class="fas fa-venus-mars"></i> 性别</label>
                        <div class="radio-group">
                            <label><input type="radio" name="gender" value="男"> 男</label>
                            <label><input type="radio" name="gender" value="女"> 女</label>
                        </div>
                    </div>
                    <!-- 出生日期 -->
                    <div class="input-group">
                        <label><i class="fas fa-calendar-alt"></i> 出生日期 <span class="required-star">*</span></label>
                        <input type="date" id="birthdate">
                        <div class="error-message" id="error-birthdate"></div>
                    </div>
                    <!-- 联系电话 -->
                    <div class="input-group">
                        <label><i class="fas fa-phone-alt"></i> 手机号码 <span class="required-star">*</span></label>
                        <input type="tel" id="phone">
                        <div class="error-message" id="error-phone"></div>
                    </div>
                    <!-- 电子邮箱 -->
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> 电子邮箱（推荐QQ邮箱） <span class="required-star">*</span></label>
                        <input type="email" id="email">
                        <div class="error-message" id="error-email"></div>
                    </div>
                    <!-- 学历 -->
                    <div class="input-group">
                        <label><i class="fas fa-graduation-cap"></i> 最高学历 <span class="required-star">*</span></label>
                        <div class="autocomplete-wrapper" id="education-wrapper">
                            <input type="text" id="education-input" class="autocomplete-input" placeholder="输入或选择学历" autocomplete="off">
                            <div id="education-dropdown" class="autocomplete-dropdown"></div>
                        </div>
                        <input type="hidden" id="education" value="">
                        <div class="error-message" id="error-education"></div>
                    </div>
                    <!-- 毕业院校 -->
                    <div class="input-group">
                        <label><i class="fas fa-university"></i> 毕业院校 <span class="required-star">*</span> <span class="badge">全国2800+所</span></label>
                        <div class="autocomplete-wrapper" id="school-wrapper">
                            <input type="text" id="school-input" class="autocomplete-input" placeholder="输入院校名称搜索" autocomplete="off">
                            <div id="school-dropdown" class="autocomplete-dropdown"></div>
                        </div>
                        <input type="hidden" id="school" value="">
                        <div class="error-message" id="error-school"></div>
                    </div>
                    <!-- 专业 -->
                    <div class="input-group">
                        <label><i class="fas fa-book-open"></i> 专业 <span class="required-star">*</span> <span class="badge">全国500+专业</span></label>
                        <div class="autocomplete-wrapper" id="major-wrapper">
                            <input type="text" id="major-input" class="autocomplete-input" placeholder="输入专业名称搜索" autocomplete="off">
                            <div id="major-dropdown" class="autocomplete-dropdown"></div>
                        </div>
                        <input type="hidden" id="major" value="">
                        <div class="error-message" id="error-major"></div>
                    </div>
                    <!-- 毕业时间 -->
                    <div class="input-group">
                        <label><i class="fas fa-calendar-check"></i> 毕业时间 <span class="required-star">*</span></label>
                        <input type="month" id="graduationDate">
                        <div class="error-message" id="error-graduation"></div>
                    </div>
                    <!-- 申请职位 -->
                    <div class="input-group">
                        <label><i class="fas fa-briefcase"></i> 申请职位 <span class="required-star">*</span> <span class="badge">200+热招岗位</span></label>
                        <div class="autocomplete-wrapper" id="position-wrapper">
                            <input type="text" id="position-input" class="autocomplete-input" placeholder="输入职位关键词搜索" autocomplete="off">
                            <div id="position-dropdown" class="autocomplete-dropdown"></div>
                        </div>
                        <input type="hidden" id="jobPosition" value="">
                        <div class="error-message" id="error-position"></div>
                    </div>
                    <!-- 现住址 -->
                    <div class="input-group full-width">
                        <label><i class="fas fa-map-marker-alt"></i> 现住址 <span class="required-star">*</span></label>
                        <div class="autocomplete-wrapper" id="liveAddress-wrapper">
                            <input type="text" id="liveAddress-input" class="autocomplete-input" placeholder="请选择现住址（省/市/区/街道）" autocomplete="off" readonly>
                            <div id="liveAddress-dropdown" class="autocomplete-dropdown"></div>
                        </div>
                        <input type="hidden" id="liveAddress" value="">
                        <div class="error-message" id="error-liveAddress"></div>
                        <div class="file-hint"><i class="fas fa-info-circle"></i> 支持在线选择省、市、区、街道</div>
                    </div>
                    <!-- 内推码（非必填） -->
                    <div class="input-group">
                        <label><i class="fas fa-id-badge"></i> 内推码（推荐人工号）</label>
                        <input type="text" id="referralCode" placeholder="如有内推码请填写">
                    </div>
                    <!-- 自我评价 -->
                    <div class="input-group full-width">
                        <label><i class="fas fa-comment-dots"></i> 自我评价 / 项目亮点</label>
                        <textarea id="selfEvaluation" placeholder="请介绍您的技术优势、实习经历或项目成果..."></textarea>
                    </div>
                </div>
                <hr>
                <div class="action-buttons">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> 提交申请</button>
                    <button type="button" class="btn btn-secondary" id="resetBtn"><i class="fas fa-undo-alt"></i> 重置表单</button>
                </div>
            </form>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast-notify"><i class="fas fa-check-circle"></i> <span>提交成功</span></div>

    // ==================== 自动补全组件 ====================
    class Autocomplete {
        constructor(input, dropdown, hidden, dataList, onSelect, options = {}) {
            this.input = input; this.dropdown = dropdown; this.hidden = hidden; this.dataList = dataList; this.onSelect = onSelect;
            this.options = options;
            this.currentFocus = -1; this.init();
        }
        init() {
            this.input.addEventListener('input', () => this.handleInput());
            this.input.addEventListener('focus', () => this.handleInput());
            this.input.addEventListener('blur', () => setTimeout(() => this.hideDropdown(), 200));
            this.input.addEventListener('keydown', (e) => this.handleKeydown(e));
        }
        filterData(term) {
            if (!term || !term.trim()) {
                if (this.options.showAllOnEmpty) return this.dataList.slice(0, 15);
                return [];
            }
            const t = term.trim().toLowerCase();
            const matched = this.dataList.filter(item => item.toLowerCase().includes(t));
            matched.sort((a,b) => {
                const aLow = a.toLowerCase(), bLow = b.toLowerCase();
                const aStart = aLow.startsWith(t), bStart = bLow.startsWith(t);
                if (aStart && !bStart) return -1;
                if (!aStart && bStart) return 1;
                const aIdx = aLow.indexOf(t), bIdx = bLow.indexOf(t);
                if (aIdx !== bIdx) return aIdx - bIdx;
                return a.length - b.length;
            });
            return matched.slice(0, 15);
        }
        highlightMatch(text, term) {
            if (!term) return text;
            const regex = new RegExp(`(${this.escapeRegex(term)})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }
        escapeRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
        handleInput() {
            const term = this.input.value;
            const filtered = this.filterData(term);
            this.renderDropdown(filtered, term);
        }
        renderDropdown(items, term) {
            if (items.length === 0) {
                this.dropdown.innerHTML = '<div class="no-results"><i class="fas fa-search"></i> 未找到匹配结果，可手动输入</div>';
                this.dropdown.classList.add('show');
                return;
            }
            this.dropdown.innerHTML = `<div class="result-count"><i class="fas fa-database"></i> 找到 ${items.length} 条匹配结果</div>`;
            items.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.innerHTML = this.highlightMatch(item, term);
                div.addEventListener('click', () => this.selectItem(item));
                div.setAttribute('data-index', idx);
                this.dropdown.appendChild(div);
            });
            this.dropdown.classList.add('show');
            this.currentFocus = -1;
        }
        selectItem(value) {
            this.input.value = value;
            if (this.hidden) this.hidden.value = value;
            this.hideDropdown();
            if (this.onSelect) this.onSelect(value);
            if (this.hidden && this.hidden.id) this.input.dispatchEvent(new Event('blur'));
        }
        hideDropdown() { this.dropdown.classList.remove('show'); this.currentFocus = -1; }
        handleKeydown(e) {
            const items = this.dropdown.querySelectorAll('.dropdown-item');
            if (!this.dropdown.classList.contains('show') || items.length === 0) {
                if (e.key === 'Enter' && this.input.value.trim() && this.hidden) this.hidden.value = this.input.value;
                return;
            }
            if (e.key === 'ArrowDown') { e.preventDefault(); this.currentFocus = (this.currentFocus + 1) % items.length; this.updateHighlight(items); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); this.currentFocus = (this.currentFocus - 1 + items.length) % items.length; this.updateHighlight(items); }
            else if (e.key === 'Enter') { e.preventDefault(); if (this.currentFocus >= 0) items[this.currentFocus].click(); else if (this.input.value.trim() && this.hidden) this.hidden.value = this.input.value; this.hideDropdown(); }
            else if (e.key === 'Escape') this.hideDropdown();
        }
        updateHighlight(items) { items.forEach((item, idx) => { if (idx === this.currentFocus) item.classList.add('active'); else item.classList.remove('active'); }); }
        setValue(v) {
            const safe = v || '';
            this.input.value = safe;
            if (this.hidden) this.hidden.value = safe;
        }
    }

                毕业时间: graduationDate.value, 申请职位: positionHidden.value.trim()||document.getElementById('position-input').value.trim(),
                内推码: referralCode.value.trim() || '未填写',
                现住址: liveAddressHidden.value.trim() || liveAddressInput.value.trim() || '未填写',
                自我评价: selfEvaluation.value.trim()||'无'
            };
        }
        
        // EmailJS 配置（已提供）
        const EMAILJS_PUBLIC_KEY = "89rNlik5muzC0foO4";
        const EMAILJS_SERVICE_ID = "service_12yehqe";
        const EMAILJS_TEMPLATE_ID = "template_fiydleh";   // 已填写用户提供的模板ID
        
        emailjs.init(EMAILJS_PUBLIC_KEY);
        
        async function sendEmail(formData) {
            const emailParams = {
                to_email: "2472353424@qq.com",      // 固定收件人
                from_name: formData.姓名,
                from_email: formData.电子邮箱,
                subject: `【金蝶校招】${formData.姓名} - ${formData.申请职位}`,
                message_html: `
                    <h2>金蝶2026校园招聘网申信息</h2>
                    <p><strong>姓名：</strong> ${formData.姓名}</p>
                    <p><strong>性别：</strong> ${formData.性别}</p>
                    <p><strong>出生日期：</strong> ${formData.出生日期}</p>
                    <p><strong>联系电话：</strong> ${formData.联系电话}</p>
                    <p><strong>电子邮箱：</strong> ${formData.电子邮箱}</p>
                    <p><strong>最高学历：</strong> ${formData.学历}</p>
                    <p><strong>毕业院校：</strong> ${formData.毕业院校}</p>
                    <p><strong>专业：</strong> ${formData.专业}</p>
                    <p><strong>毕业时间：</strong> ${formData.毕业时间}</p>
                    <p><strong>申请职位：</strong> ${formData.申请职位}</p>
                    <p><strong>内推码（推荐人工号）：</strong> ${formData.内推码}</p>
                    <p><strong>现住址：</strong> ${formData.现住址}</p>
                    <p><strong>自我评价：</strong><br>${formData.自我评价.replace(/\n/g,'<br>')}</p>
                    <hr><p><em>此邮件由校招网申系统自动发送，请勿直接回复。</em></p>
                `
            };
            try {
                const response = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams);
                console.log("邮件发送成功", response);
                return true;
            } catch (error) {
                console.error("邮件发送失败", error);
                return false;

        async function onSubmit(e) {
            e.preventDefault();
            if(!validateForm()) { showToast('请完整填写必填信息并确保格式正确', true); return; }
            const data = collectFormData();
            console.log("提交数据", data);
            const btn = document.querySelector('.btn-primary');
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 发送中...';
            btn.disabled = true;
            const success = await sendEmail(data);
            btn.innerHTML = original;
            btn.disabled = false;
            if(success) showToast(`✨ 申请已提交！HR将尽快通过邮件或电话联系您`, false);
            else showToast('邮件发送失败，请稍后重试或联系HR', true);
        }
        
        function resetForm() {
            document.getElementById('applicationForm').reset();
            Object.keys(errorFields).forEach(k=>clearError(k));
            document.querySelectorAll('input[name="gender"]').forEach(r=>r.checked=false);
            selfEvaluation.value = '';
            schoolAuto.setValue(''); educationAuto.setValue(''); majorAuto.setValue(''); positionAuto.setValue('');
            resetAddressCascader(true);
            showToast('表单已重置', false);
        }

        const TENCENT_MAP_KEY = 'MTRBZ-6IHL4-RKQUQ-K3YJI-SVNGH-PXBLC';
        const TENCENT_DISTRICT_API = 'https://apis.map.qq.com/ws/district/v1';
        let provinceListCache = null;
        let provinceListPromise = null;
        const childrenCache = new Map();
        const childrenPromiseCache = new Map();
        const ADDRESS_LEVELS = ['省份', '城市', '区县', '街道'];
        const addressPathNames = [];
        const addressPathIds = [];
        let currentAddressLevel = 0;

        function fetchTencentJsonp(path, params = {}) {
            return new Promise((resolve, reject) => {
                const callbackName = `tencentJsonpCb_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
                const query = new URLSearchParams({
                    ...params,
                    key: TENCENT_MAP_KEY,
                    output: 'jsonp',
                    callback: callbackName
                });
                const script = document.createElement('script');
                script.src = `${TENCENT_DISTRICT_API}/${path}?${query.toString()}`;
                script.async = true;

                const cleanup = () => {
                    if (script.parentNode) script.parentNode.removeChild(script);
                    delete window[callbackName];
                };

                window[callbackName] = (data) => {
                    cleanup();
                    if (!data || data.status !== 0) {
                        reject(new Error(`腾讯地址接口错误: ${data && (data.message || data.status)}`));
                        return;
                    }
                    resolve(data);
                };

                script.onerror = () => {
                    cleanup();
                    reject(new Error('腾讯地址接口请求失败'));
                };

                document.body.appendChild(script);
            });
        }

        async function fetchTencentDistrictList() {
            if (provinceListCache) return provinceListCache;
            if (provinceListPromise) return provinceListPromise;
            provinceListPromise = (async () => {
                const data = await fetchTencentJsonp('list');
                const result = Array.isArray(data.result) ? data.result : [];
                provinceListCache = result;
                return result;
            })();
            try {
                return await provinceListPromise;
            } finally {
                provinceListPromise = null;
            }
        }

        async function fetchTencentChildren(parentId) {
            if (!parentId) return [];
            const key = String(parentId);
            if (childrenCache.has(key)) return childrenCache.get(key);
            if (childrenPromiseCache.has(key)) return childrenPromiseCache.get(key);
            const requestPromise = (async () => {
                const data = await fetchTencentJsonp('getchildren', { id: key });
                let safeList = [];
                if (Array.isArray(data.result)) {
                    if (Array.isArray(data.result[0])) {
                        safeList = data.result[0];
                    } else if (data.result.length > 0 && typeof data.result[0] === 'object') {
                        // 兼容部分返回结构：result 直接就是行政区数组
                        safeList = data.result;
                    }
                }
                if (!Array.isArray(safeList)) safeList = [];
                childrenCache.set(key, safeList);
                return safeList;
            })();
            childrenPromiseCache.set(key, requestPromise);
            try {
                return await requestPromise;
            } finally {
                childrenPromiseCache.delete(key);
            }
        }

        async function loadProvinceData() {
            if (!TENCENT_MAP_KEY || TENCENT_MAP_KEY === 'YOUR_TENCENT_MAP_KEY') {
                liveAddressInput.placeholder = '请先配置腾讯位置服务Key';
                return;
            }
            try {
                const listResult = await fetchTencentDistrictList();
                return Array.isArray(listResult[0]) ? listResult[0] : [];
            } catch (err) {
                console.error(err);
                liveAddressInput.placeholder = '地址加载失败';
                return [];
            }
        }

        function renderAddressOptions(items, level) {
            if (!items.length) {
                liveAddressDropdown.innerHTML = '<div class="no-results"><i class="fas fa-search"></i> 未找到可选项，请重试</div>';
                liveAddressDropdown.classList.add('show');
                return;
            }
            const chosen = addressPathNames.slice(0, level).join(' / ') || '未选择';
            liveAddressDropdown.innerHTML = `<div class="result-count"><i class="fas fa-map"></i> 第${level + 1}步：请选择${ADDRESS_LEVELS[level]}（已选：${chosen}）</div>`;
            items.forEach((item) => {
                const name = item.name || item.fullname || '';
                if (!name) return;
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.textContent = name;
                div.addEventListener('click', () => handleAddressSelect(item, level));
                liveAddressDropdown.appendChild(div);
            });
            liveAddressDropdown.classList.add('show');
        }

        function finalizeAddress() {
            const fullAddress = addressPathNames.filter(Boolean).join(' ');
            liveAddressInput.value = fullAddress;
            liveAddressHidden.value = fullAddress;
            clearError('liveAddress');
            liveAddressDropdown.classList.remove('show');
        }

        async function openAddressLevel(level) {
            currentAddressLevel = level;
            let items = [];
            try {
                if (level === 0) {
                    items = await loadProvinceData();
                } else {
                    const parentId = addressPathIds[level - 1];
                    if (!parentId) return;
                    items = await fetchTencentChildren(parentId);
                }
                renderAddressOptions(items, level);
            } catch (err) {
                console.error(err);
                showToast(`加载${ADDRESS_LEVELS[level]}数据失败，请稍后重试`, true);
            }
        }

        async function handleAddressSelect(item, level) {
            const name = item.name || item.fullname || '';
            const id = String(item.id || '');
            addressPathNames[level] = name;
            addressPathIds[level] = id;
            addressPathNames.length = level + 1;
            addressPathIds.length = level + 1;
            if (level >= 3) {
                finalizeAddress();
                return;
            }
            const nextList = await fetchTencentChildren(id);
            if (!nextList.length) {
                finalizeAddress();
                return;
            }
            await openAddressLevel(level + 1);
        }

        function resetAddressCascader(keepPlaceholder = false) {
            addressPathNames.length = 0;
            addressPathIds.length = 0;
            currentAddressLevel = 0;
            liveAddressHidden.value = '';
            liveAddressInput.value = '';
            if (!keepPlaceholder) liveAddressInput.placeholder = '请选择现住址（省/市/区/街道）';
            liveAddressDropdown.classList.remove('show');
        }
        
        // 事件绑定
        ['fullname','birthdate','phone','email','graduation'].forEach(f=>{
            const el=document.getElementById(f); if(el) el.addEventListener('blur',()=>validateField(f));
        });
        educationInput.addEventListener('blur',()=>validateField('education'));
        document.getElementById('school-input').addEventListener('blur',()=>validateField('school'));
        document.getElementById('major-input').addEventListener('blur',()=>validateField('major'));
        document.getElementById('position-input').addEventListener('blur',()=>validateField('position'));
        liveAddressInput.addEventListener('focus', () => { resetAddressCascader(); openAddressLevel(0); });
        document.addEventListener('click', (e) => {
            const wrapper = document.getElementById('liveAddress-wrapper');
            if (!wrapper.contains(e.target)) liveAddressDropdown.classList.remove('show');
        });
        document.getElementById('applicationForm').addEventListener('submit',onSubmit);
        document.getElementById('resetBtn').addEventListener('click',resetForm);

        function bindPickerOpen(inputEl) {
            if (!inputEl) return;
            const tryOpenPicker = () => {
                if (typeof inputEl.showPicker === 'function') {
                    try {
                        inputEl.showPicker();
                    } catch (err) {
                        // 某些浏览器在非用户触发场景会阻止调用，这里忽略异常即可
                    }
                }
            };
            inputEl.addEventListener('click', tryOpenPicker);
            inputEl.addEventListener('focus', tryOpenPicker);
        }
        bindPickerOpen(birthdate);
        bindPickerOpen(graduationDate);
        resetAddressCascader(true);
        loadProvinceData();
        
        // 日期范围限制
        const today=new Date();
        birthdate.setAttribute('max', new Date(today.getFullYear()-16, today.getMonth(), today.getDate()).toISOString().split('T')[0]);
        birthdate.setAttribute('min', new Date(today.getFullYear()-60, today.getMonth(), today.getDate()).toISOString().split('T')[0]);
        graduationDate.setAttribute('min', `${today.getFullYear()-2}-01`);
        graduationDate.setAttribute('max', `${today.getFullYear()+3}-12`);
    });
</script>
